<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:ital,wght,CRSV,ELSH,ELXP@0,100..700,0..1,0..1,0..1;1,100..700,0..1,0..1,0..1&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="slider-container">
    <!-- SVG for the bending line and tick marks -->
    <svg class="slider-svg" id="sliderSvg">
      <defs>
        <!-- Glow filter -->
        <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <!-- Softer glow gradient -->
        <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
          <stop class="glow-stop" offset="0%" stop-color="#FF8000" stop-opacity="0.5"/>
          <stop class="glow-stop" offset="60%" stop-color="#FF8000" stop-opacity="0.2"/>
          <stop class="glow-stop" offset="100%" stop-color="#FF8000" stop-opacity="0"/>
        </radialGradient>
        <!-- Soft circular mask for glow -->
        <mask id="glowMask">
          <radialGradient id="maskGradient" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="white" stop-opacity="1"/>
            <stop offset="70%" stop-color="white" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="white" stop-opacity="0"/>
          </radialGradient>
          <circle id="glowMaskCircle" r="100" fill="url(#maskGradient)"/>
        </mask>
      </defs>

      <!-- Glow circle that follows the button (soft circular mask) -->
      <circle id="glowCircle" r="100" fill="url(#glowGradient)" mask="url(#glowMask)"/>

      <!-- The bending line -->
      <path id="sliderLine" class="slider-line"/>

      <!-- Tick marks group -->
      <g id="tickMarks"></g>
    </svg>

    <!-- Number labels -->
    <div class="labels" id="labels"></div>

    <!-- Draggable button with progress ring -->
    <div class="slider-button-wrapper" id="sliderButtonWrapper">
      <svg class="progress-ring" viewBox="0 0 80 80" overflow="visible">
        <circle class="progress-ring-bg" cx="40" cy="40" r="36"/>
        <circle class="progress-ring-fill" id="progressRing" cx="40" cy="40" r="36"/>
      </svg>
      <div class="slider-button" id="sliderButton">
        <div class="button-arrows">
          <span class="arrow up">▲</span>
          <span class="arrow down">▼</span>
        </div>
      </div>
    </div>

    <!-- Large value display -->
    <div class="value-container" id="valueContainer">
      <div class="value-display" id="valueDisplay">25</div>
      <div class="seconds-display" id="secondsDisplay">59</div>
    </div>

    <!-- Branding -->
    <div class="branding">
      <div class="branding-title">
        <div>PRO</div>
        <div>MOD</div>
        <div>ORO</div>
      </div>
      <div class="branding-author">By Anurag Bartarey</div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="control-btn" id="pauseBtn" title="Pause/Resume">
        <i class="icon-pause" data-feather="pause"></i>
        <i class="icon-play" data-feather="play" style="display: none;"></i>
        <span class="btn-label pause-label">Pause</span>
        <span class="btn-label play-label" style="display: none;">Play</span>
      </button>
      <button class="control-btn" id="muteBtn" title="Mute/Unmute">
        <i class="icon-sound" data-feather="volume-2"></i>
        <i class="icon-muted" data-feather="volume-x" style="display: none;"></i>
        <span class="btn-label mute-label">Mute</span>
        <span class="btn-label unmute-label" style="display: none;">Unmute</span>
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
